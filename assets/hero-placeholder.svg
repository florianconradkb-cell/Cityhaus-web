<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-label="Platzhalter Archivfoto">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9e9e9"/>
      <stop offset="100%" stop-color="#cfcfcf"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b9b9b9"/>
      <stop offset="100%" stop-color="#9a9a9a"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="900" height="620" fill="url(#sky)"/>
  <rect x="0" y="430" width="900" height="190" fill="#8f8f8f"/>

  <!-- corner building silhouette -->
  <path d="M120,430 L120,220 Q120,160 200,150 L560,120 Q640,115 640,190 L640,430 Z"
        fill="url(#wall)" stroke="#7c7c7c" stroke-width="2"/>

  <!-- rounded corner tower -->
  <path d="M200,150 Q120,160 120,260 L120,430 L200,430 L200,150 Z"
        fill="#a7a7a7" stroke="#7c7c7c" stroke-width="2"/>

  <!-- windows grid -->
  <g fill="#e4e4e4" stroke="#7c7c7c" stroke-width="1">
    <g>
      <rect x="150" y="200" width="26" height="46"/>
      <rect x="190" y="200" width="26" height="46"/>
      <rect x="230" y="195" width="26" height="46"/>
      <rect x="270" y="192" width="26" height="46"/>
      <rect x="310" y="190" width="26" height="46"/>
      <rect x="350" y="188" width="26" height="46"/>
      <rect x="390" y="186" width="26" height="46"/>
      <rect x="430" y="184" width="26" height="46"/>
      <rect x="470" y="182" width="26" height="46"/>
      <rect x="510" y="180" width="26" height="46"/>
      <rect x="550" y="178" width="26" height="46"/>
      <rect x="590" y="180" width="26" height="46"/>
    </g>
    <g>
      <rect x="150" y="270" width="26" height="46"/>
      <rect x="190" y="270" width="26" height="46"/>
      <rect x="230" y="265" width="26" height="46"/>
      <rect x="270" y="262" width="26" height="46"/>
      <rect x="310" y="260" width="26" height="46"/>
      <rect x="350" y="258" width="26" height="46"/>
      <rect x="390" y="256" width="26" height="46"/>
      <rect x="430" y="254" width="26" height="46"/>
      <rect x="470" y="252" width="26" height="46"/>
      <rect x="510" y="250" width="26" height="46"/>
      <rect x="550" y="248" width="26" height="46"/>
      <rect x="590" y="250" width="26" height="46"/>
    </g>
    <g>
      <rect x="150" y="340" width="26" height="46"/>
      <rect x="190" y="340" width="26" height="46"/>
      <rect x="230" y="335" width="26" height="46"/>
      <rect x="270" y="332" width="26" height="46"/>
      <rect x="310" y="330" width="26" height="46"/>
      <rect x="350" y="328" width="26" height="46"/>
      <rect x="390" y="326" width="26" height="46"/>
      <rect x="430" y="324" width="26" height="46"/>
      <rect x="470" y="322" width="26" height="46"/>
      <rect x="510" y="320" width="26" height="46"/>
      <rect x="550" y="318" width="26" height="46"/>
      <rect x="590" y="320" width="26" height="46"/>
    </g>
  </g>

  <!-- storefront band -->
  <rect x="120" y="430" width="520" height="60" fill="#4d4d4d"/>
  <text x="160" y="468" font-family="Georgia, serif" font-size="24" letter-spacing="2" fill="#e6e6e6">cityhaus</text>

  <!-- ground / street -->
  <rect x="0" y="490" width="900" height="130" fill="#767676"/>
  <rect x="0" y="600" width="900" height="20" fill="#5c5c5c"/>

  <!-- simple parked car shapes -->
  <rect x="700" y="540" width="120" height="34" rx="8" fill="#6d6d6d" stroke="#555" stroke-width="1"/>
  <circle cx="722" cy="576" r="9" fill="#3f3f3f"/>
  <circle cx="800" cy="576" r="9" fill="#3f3f3f"/>

  <rect x="40" y="545" width="90" height="30" rx="7" fill="#6d6d6d" stroke="#555" stroke-width="1"/>
  <circle cx="58" cy="577" r="8" fill="#3f3f3f"/>
  <circle cx="112" cy="577" r="8" fill="#3f3f3f"/>
